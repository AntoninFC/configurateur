<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFS — Configurateur Foil Complet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; }
    @media (min-width: 768px) { body { overflow:hidden; } }
    .radar-area { transition: d 0.6s cubic-bezier(.25,.8,.25,1); }
    .score-bar { transition: width 0.5s cubic-bezier(.25,.8,.25,1); }
    .part-btn { transition: all 0.2s ease; }
  </style>
</head>
<body class="bg-[#f2f2f2]">

<div id="app" class="min-h-screen md:h-screen flex flex-col"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const PARTS = {
  aile_avant: [
    { id: 'silk-v2-850', name: 'Silk V2 850', file: 'models/silk-v2-850.glb' },
    { id: 'silk-v2-750', name: 'Silk V2 750', file: 'models/silk-v2-750.glb' },
  ],
  stabilisateur: [
    { id: 'ucarve-130', name: 'UCarve 130', file: 'models/ucarve-130.glb' },
  ],
  fuselage: [
    { id: 'fuselage-evo', name: 'Fuselage Evo', file: 'models/fuselage-evo.glb' },
  ],
  mat: [
    { id: 'uhm-85', name: 'UHM 85', file: 'models/uhm-85.glb' },
  ],
};

const SCORE_AXES = [
  { key: 'carving_access', label: 'Carving Access' },
  { key: 'carving', label: 'Carving' },
  { key: 'downwind_access', label: 'DW Access' },
  { key: 'downwind', label: 'Downwind' },
  { key: 'freeride_access', label: 'FR Access' },
  { key: 'freeride', label: 'Freeride' },
  { key: 'freestyle', label: 'Freestyle' },
  { key: 'freerace', label: 'Freerace' },
  { key: 'wave', label: 'Wave' },
];

const SETUPS = [
  { aile_avant:'silk-v2-850', stabilisateur:'ucarve-130', fuselage:'fuselage-evo', mat:'uhm-85',
    scores:{carving_access:85,carving:78,downwind_access:45,downwind:30,freeride_access:90,freeride:82,freestyle:65,freerace:50,wave:60}},
  { aile_avant:'silk-v2-750', stabilisateur:'ucarve-130', fuselage:'fuselage-evo', mat:'uhm-85',
    scores:{carving_access:72,carving:85,downwind_access:38,downwind:22,freeride_access:78,freeride:74,freestyle:80,freerace:68,wave:72}},
];

const TYPE_LABELS = { aile_avant:'Aile avant', stabilisateur:'Stabilisateur', fuselage:'Fuselage', mat:'Mât' };
const PART_TYPES = ['aile_avant','stabilisateur','fuselage','mat'];

// ═══════════════════════════════════════════
// THREE.JS
// ═══════════════════════════════════════════
let scene, camera, renderer, controls, envMap;
const loadedModels = {};
const activeModels = {};
const loader = new GLTFLoader();

function initThree(container) {
  scene = new THREE.Scene();
  const canvas = document.createElement('canvas');
  canvas.width = 2; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#dce8f0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 2, 256);
  scene.background = new THREE.CanvasTexture(canvas);

  camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.01, 100);
  camera.position.set(0.4, 0.6, 1.4);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.8;
  container.appendChild(renderer.domElement);

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  envMap = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
  scene.environment = envMap;

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.minDistance = 0.3;
  controls.maxDistance = 4;
  controls.target.set(0, 0.2, 0);

  const ro = new ResizeObserver(() => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
  ro.observe(container);
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function loadModel(partId, filePath) {
  return new Promise((resolve) => {
    if (loadedModels[partId]) { resolve(loadedModels[partId].clone()); return; }
    loader.load(filePath, (gltf) => {
      const model = gltf.scene;
      model.traverse((child) => {
        if (child.isMesh && !child.material.map) {
          child.material = new THREE.MeshPhysicalMaterial({
            color: 0x1a1a1a, roughness: 0.25, metalness: 0.8,
            clearcoat: 0.4, clearcoatRoughness: 0.2,
            envMap: envMap, envMapIntensity: 1.5,
          });
        }
      });
      loadedModels[partId] = model;
      resolve(model.clone());
    });
  });
}

async function showPart(type, partId) {
  if (activeModels[type]) { scene.remove(activeModels[type]); delete activeModels[type]; }
  if (!partId) return;
  const part = PARTS[type].find(p => p.id === partId);
  if (!part) return;
  const model = await loadModel(part.id, part.file);
  scene.add(model);
  activeModels[type] = model;
  fitCamera();
}

function fitCamera() {
  const box = new THREE.Box3();
  Object.values(activeModels).forEach(m => box.expandByObject(m));
  if (box.isEmpty()) return;
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360));
  controls.target.copy(center);
  camera.position.set(center.x + dist * 0.5, center.y + dist * 0.4, center.z + dist * 1.2);
  controls.update();
}

function removeAllModels() {
  Object.keys(activeModels).forEach(type => { scene.remove(activeModels[type]); delete activeModels[type]; });
}

function showSelectionInViewer(sel) {
  removeAllModels();
  PART_TYPES.forEach(type => { if (sel[type]) showPart(type, sel[type]); });
}

Object.values(PARTS).flat().forEach(part => { loadModel(part.id, part.file); });

// ═══════════════════════════════════════════
// LOGIC
// ═══════════════════════════════════════════
function findSetup(sel) {
  if (!sel.aile_avant || !sel.stabilisateur || !sel.fuselage || !sel.mat) return null;
  return SETUPS.find(s => s.aile_avant===sel.aile_avant && s.stabilisateur===sel.stabilisateur && s.fuselage===sel.fuselage && s.mat===sel.mat) || null;
}

function getCompatibleParts(partType, sel) {
  const others = PART_TYPES.filter(t => t !== partType);
  const hasAny = others.some(t => sel[t]);
  if (!hasAny) return PARTS[partType].map(p => p.id);
  const matching = SETUPS.filter(setup => others.every(t => !sel[t] || setup[t] === sel[t]));
  return [...new Set(matching.map(s => s[partType]))];
}

function getSetupLabel(sel) {
  const names=[];
  PART_TYPES.forEach(type=>{if(sel[type]){const p=PARTS[type].find(x=>x.id===sel[type]);if(p)names.push(p.name);}});
  return names.join(' · ')||'';
}

// ── RADAR (supports 1 or 2 score sets)
const RS=300, RC=RS/2, RR=105, LR=RR+28, RINGS=[20,40,60,80,100];
const COLOR_A = { stroke:'#0891b2', fill:'rgba(8,145,178,0.18)', dot:'#0891b2', text:'#0e7490' };
const COLOR_B = { stroke:'#f97316', fill:'rgba(249,115,22,0.15)', dot:'#f97316', text:'#c2410c' };

function polar(a,r){ const rad=((a-90)*Math.PI)/180; return {x:RC+r*Math.cos(rad),y:RC+r*Math.sin(rad)}; }

function buildRadarPath(scores){
  const step=360/SCORE_AXES.length;
  return SCORE_AXES.map((axis,i)=>{const val=(scores&&scores[axis.key])||0;const r=(val/100)*RR;const{x,y}=polar(i*step,r);return`${i===0?'M':'L'}${x.toFixed(2)},${y.toFixed(2)}`;}).join(' ')+'Z';
}

function renderRadarSVG(scoresA, scoresB) {
  const step=360/SCORE_AXES.length;
  let svg=`<svg viewBox="0 0 ${RS} ${RS}" class="w-full max-w-[280px] mx-auto">`;

  // Grid
  RINGS.forEach(val=>{const r=(val/100)*RR;svg+=`<circle cx="${RC}" cy="${RC}" r="${r}" fill="none" stroke="#e5e5e5" stroke-width="0.7"/>`;});
  SCORE_AXES.forEach((_,i)=>{const{x,y}=polar(i*step,RR);svg+=`<line x1="${RC}" y1="${RC}" x2="${x}" y2="${y}" stroke="#e5e5e5" stroke-width="0.7"/>`;});

  // Area B (behind A)
  if (scoresB) {
    svg+=`<path class="radar-area" d="${buildRadarPath(scoresB)}" fill="${COLOR_B.fill}" stroke="${COLOR_B.stroke}" stroke-width="1.8" stroke-linejoin="round" stroke-dasharray="6 3"/>`;
    SCORE_AXES.forEach((axis,i)=>{const val=scoresB[axis.key]||0;const r=(val/100)*RR;const{x,y}=polar(i*step,r);svg+=`<circle cx="${x}" cy="${y}" r="3" fill="${COLOR_B.dot}"/>`;});
  }

  // Area A
  if (scoresA) {
    svg+=`<path class="radar-area" d="${buildRadarPath(scoresA)}" fill="${COLOR_A.fill}" stroke="${COLOR_A.stroke}" stroke-width="2" stroke-linejoin="round"/>`;
    SCORE_AXES.forEach((axis,i)=>{const val=scoresA[axis.key]||0;const r=(val/100)*RR;const{x,y}=polar(i*step,r);svg+=`<circle cx="${x}" cy="${y}" r="3.5" fill="${COLOR_A.dot}"/>`;});
  }

  // Labels + values
  SCORE_AXES.forEach((axis,i)=>{
    const lbl=polar(i*step,LR);
    svg+=`<text x="${lbl.x}" y="${lbl.y}" text-anchor="middle" dominant-baseline="central" fill="#888" style="font-size:9px;font-weight:500">${axis.label}</text>`;
    if (scoresA && !scoresB) {
      svg+=`<text x="${lbl.x}" y="${lbl.y+12}" text-anchor="middle" dominant-baseline="central" fill="${COLOR_A.text}" style="font-size:10px;font-weight:700">${scoresA[axis.key]}</text>`;
    }
    if (scoresA && scoresB) {
      svg+=`<text x="${lbl.x-10}" y="${lbl.y+12}" text-anchor="middle" dominant-baseline="central" fill="${COLOR_A.text}" style="font-size:9px;font-weight:700">${scoresA[axis.key]}</text>`;
      svg+=`<text x="${lbl.x+10}" y="${lbl.y+12}" text-anchor="middle" dominant-baseline="central" fill="${COLOR_B.text}" style="font-size:9px;font-weight:700">${scoresB[axis.key]}</text>`;
    }
  });

  svg+='</svg>';return svg;
}

// ── SCORE BARS (supports comparison)
function scoreColor(val){
  if(val>=70) return '#0891b2';
  if(val>=40) return '#f59e0b';
  return '#ef4444';
}

function renderScoreBars(scoresA, scoresB) {
  if(!scoresA && !scoresB) return '';
  return `<div class="space-y-1.5">${SCORE_AXES.map(axis=>{
    const vA = scoresA ? scoresA[axis.key] : 0;
    const vB = scoresB ? scoresB[axis.key] : null;
    let bars = '';
    if (scoresA) {
      bars += `<div class="flex-1 h-[5px] bg-gray-100 rounded-full overflow-hidden"><div class="score-bar h-full rounded-full" style="width:${vA}%;background:${COLOR_A.stroke}"></div></div>`;
      bars += `<span class="text-[10px] font-bold w-6 text-right tabular-nums" style="color:${COLOR_A.text}">${vA}</span>`;
    }
    if (scoresB) {
      bars += `<span class="text-[10px] font-bold w-6 text-left tabular-nums" style="color:${COLOR_B.text}">${vB}</span>`;
      bars += `<div class="flex-1 h-[5px] bg-gray-100 rounded-full overflow-hidden"><div class="score-bar h-full rounded-full" style="width:${vB}%;background:${COLOR_B.stroke}"></div></div>`;
    }
    return `<div class="flex items-center gap-1.5">
      <span class="text-[10px] text-gray-500 w-[70px] text-right truncate">${axis.label}</span>
      ${bars}
    </div>`;
  }).join('')}</div>`;
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let selection = { aile_avant:null, stabilisateur:null, fuselage:null, mat:null };
let compareMode = false;
let selectionB = { aile_avant:null, stabilisateur:null, fuselage:null, mat:null };
let viewerShowing = 'A'; // which setup is shown in the 3D viewer

function emptySelection() { return { aile_avant:null, stabilisateur:null, fuselage:null, mat:null }; }

window.handleSelect = function(type, id) {
  selection[type] = id || null;
  if (!compareMode) showPart(type, selection[type]);
  else showSelectionInViewer(selection);
  renderUI();
};

window.handleSelectB = function(type, id) {
  selectionB[type] = id || null;
  renderUI();
};

window.handleReset = function() {
  selection = emptySelection();
  compareMode = false;
  selectionB = emptySelection();
  viewerShowing = 'A';
  removeAllModels();
  renderUI();
};

window.handleStartCompare = function() {
  compareMode = true;
  selectionB = emptySelection();
  viewerShowing = 'A';
  renderUI();
};

window.handleExitCompare = function() {
  compareMode = false;
  selectionB = emptySelection();
  viewerShowing = 'A';
  showSelectionInViewer(selection);
  renderUI();
};

window.handleViewerToggle = function(which) {
  viewerShowing = which;
  const sel = which === 'A' ? selection : selectionB;
  showSelectionInViewer(sel);
  renderUI();
};

// ═══════════════════════════════════════════
// PART SELECTOR
// ═══════════════════════════════════════════
const ICONS = {
  aile_avant:'<img src="icons/aile_avant.png" class="h-5" style="mix-blend-mode:multiply" />',
  stabilisateur:'<img src="icons/stabilisateur.png" class="h-5" style="mix-blend-mode:multiply" />',
  fuselage:'<img src="icons/fuselage.png" class="h-7" style="mix-blend-mode:multiply" />',
  mat:'<img src="icons/mat.png" class="h-7" style="mix-blend-mode:multiply" />',
};

function renderPartSelector(type, sel, handler, accentColor) {
  const parts=PARTS[type], label=TYPE_LABELS[type], compat=getCompatibleParts(type, sel);
  const selPart=parts.find(p=>p.id===sel[type]);
  const bgSel = accentColor === 'B' ? 'bg-orange-500 text-white border-orange-500' : 'bg-cyan-700 text-white border-cyan-700';
  const ringSel = accentColor === 'B' ? 'focus:ring-orange-400/30' : 'focus:ring-cyan-500/30';
  let html=`<div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100">`;
  html+=`<div class="flex items-center gap-1.5 mb-2">${ICONS[type]}<h3 class="text-[10px] font-semibold text-gray-900 uppercase tracking-wider">${label}</h3></div>`;
  html+=`<div class="relative">`;
  html+=`<select onchange="${handler}('${type}',this.value)" class="w-full appearance-none text-xs font-medium px-3 py-2 rounded-lg border cursor-pointer focus:outline-none focus:ring-2 ${ringSel} ${selPart ? bgSel : 'bg-gray-50 text-gray-900 border-gray-200 hover:border-gray-300'}">`;
  html+=`<option value="" ${!selPart?'selected':''}>Choisir…</option>`;
  parts.forEach(part=>{
    const isOk=compat.includes(part.id);
    html+=`<option value="${part.id}" ${sel[type]===part.id?'selected':''} ${!isOk?'disabled':''}>${part.name}${!isOk?' — N/A':''}</option>`;
  });
  html+=`</select>`;
  html+=`<svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 ${selPart?'text-white/70':'text-gray-400'}" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>`;
  html+=`</div></div>`;
  return html;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderUI(){
  const setupA = findSetup(selection);
  const setupB = compareMode ? findSetup(selectionB) : null;
  const selCount = PART_TYPES.filter(t=>selection[t]).length;
  const selCountB = PART_TYPES.filter(t=>selectionB[t]).length;
  const isComplete = selCount===4;
  const isIncompat = isComplete && !setupA;
  const canCompare = setupA && !compareMode;

  // ── HEADER
  let headerHtml = `<div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="logo.svg" alt="AFS" class="h-7" />
      <div>
        <p class="text-[10px] uppercase tracking-[0.15em] text-gray-400 font-medium">Configurateur</p>
        <h1 class="text-xl font-bold text-gray-900">Foil Complet</h1>
      </div>
    </div>
    <div class="flex items-center gap-3">`;
  if (canCompare) {
    headerHtml += `<button onclick="handleStartCompare()" class="text-[10px] uppercase tracking-wider bg-orange-500 text-white px-3 py-1.5 rounded-lg font-semibold hover:bg-orange-600 transition-colors">Comparer</button>`;
  }
  if (compareMode) {
    headerHtml += `<button onclick="handleExitCompare()" class="text-[10px] uppercase tracking-wider text-orange-500 border border-orange-300 px-3 py-1.5 rounded-lg font-semibold hover:bg-orange-50 transition-colors">Quitter comparaison</button>`;
  }
  if (selCount > 0) {
    headerHtml += `<button onclick="handleReset()" class="text-[10px] uppercase tracking-wider text-gray-400 hover:text-gray-600 font-medium">Réinitialiser</button>`;
  }
  headerHtml += `</div></div>`;
  document.getElementById('header').innerHTML = headerHtml;

  // ── CTA
  const cta=document.getElementById('viewer-cta');
  if(cta) cta.style.display=selCount>0?'none':'flex';

  // ── VIEWER TOGGLE (in compare mode)
  const toggleEl = document.getElementById('viewer-toggle');
  if (toggleEl) {
    if (compareMode && (setupA || setupB)) {
      const labelA = getSetupLabel(selection) || 'Setup A';
      const labelB = getSetupLabel(selectionB) || 'Setup B';
      toggleEl.style.display = 'flex';
      toggleEl.innerHTML = `
        <button onclick="handleViewerToggle('A')" class="px-3 py-1 rounded-l-lg text-[10px] font-semibold transition-colors ${viewerShowing==='A' ? 'bg-cyan-700 text-white' : 'bg-white/80 text-gray-500 hover:text-gray-700'}">A · ${labelA}</button>
        <button onclick="handleViewerToggle('B')" class="px-3 py-1 rounded-r-lg text-[10px] font-semibold transition-colors ${viewerShowing==='B' ? 'bg-orange-500 text-white' : 'bg-white/80 text-gray-500 hover:text-gray-700'}">B · ${labelB}</button>
      `;
    } else {
      toggleEl.style.display = 'none';
    }
  }

  // ── RIGHT PANEL
  let rhtml = '';

  // Radar + score bars
  rhtml+=`<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 flex-shrink-0">`;

  if (compareMode && (setupA || setupB)) {
    // Legend
    rhtml += `<div class="flex items-center justify-center gap-4 mb-3">
      <div class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded" style="background:${COLOR_A.stroke}"></span><span class="text-[10px] font-semibold" style="color:${COLOR_A.text}">Setup A</span></div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded" style="background:${COLOR_B.stroke}"></span><span class="text-[10px] font-semibold" style="color:${COLOR_B.text}">Setup B</span></div>
    </div>`;
  }

  rhtml+=`<div class="relative">
    ${renderRadarSVG(setupA?setupA.scores:null, setupB?setupB.scores:null)}
    ${!setupA && !setupB?`<div class="absolute inset-0 flex items-center justify-center">
      <p class="text-xs text-gray-400 text-center px-3 py-1.5 bg-white/80 backdrop-blur-sm rounded-lg">
        ${isIncompat?"Combinaison non disponible":"Sélectionnez vos 4 composants"}
      </p>
    </div>`:''}
  </div>`;
  rhtml += renderScoreBars(setupA?setupA.scores:null, setupB?setupB.scores:null);
  rhtml += `</div>`;

  if (!compareMode) {
    // ── Normal mode: single set of selectors
    rhtml+=`<div class="grid grid-cols-2 gap-3 flex-shrink-0">`;
    PART_TYPES.forEach(type=>{ rhtml+=renderPartSelector(type, selection, 'handleSelect', 'A'); });
    rhtml+=`</div>`;
  } else {
    // ── Compare mode: two columns of selectors
    rhtml += `<div class="flex-shrink-0">`;

    // Setup A (locked display)
    rhtml += `<div class="mb-3">`;
    rhtml += `<div class="flex items-center gap-2 mb-2"><span class="w-2.5 h-2.5 rounded-full" style="background:${COLOR_A.stroke}"></span><h3 class="text-[11px] font-bold text-gray-900 uppercase tracking-wider">Setup A</h3></div>`;
    rhtml += `<div class="grid grid-cols-2 gap-2">`;
    PART_TYPES.forEach(type=>{ rhtml+=renderPartSelector(type, selection, 'handleSelect', 'A'); });
    rhtml += `</div></div>`;

    // Setup B
    rhtml += `<div>`;
    rhtml += `<div class="flex items-center gap-2 mb-2"><span class="w-2.5 h-2.5 rounded-full" style="background:${COLOR_B.stroke}"></span><h3 class="text-[11px] font-bold text-gray-900 uppercase tracking-wider">Setup B</h3></div>`;
    rhtml += `<div class="grid grid-cols-2 gap-2">`;
    PART_TYPES.forEach(type=>{ rhtml+=renderPartSelector(type, selectionB, 'handleSelectB', 'B'); });
    rhtml += `</div></div>`;

    rhtml += `</div>`;
  }

  if(isIncompat){
    rhtml+=`<div class="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 flex items-center gap-2 flex-shrink-0">
